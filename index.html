<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>June Directory — Exact 1:1 Single File</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #ede7dc;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
    }
    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: linear-gradient(180deg, #ece5d9 0%, #e9e2d7 100%);
    }
    .board {
      position: relative;
      width: min(100vw, 1402px);
      aspect-ratio: 1402 / 1122;
      overflow: hidden;
      background: #f2ede4;
    }
    .mockup {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center top;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .hotspot {
      position: absolute;
      border-radius: 16px;
      text-decoration: none;
      color: transparent;
      background: rgba(10, 86, 255, 0);
      transition: .18s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .hotspot:hover, .hotspot:focus-visible {
      background: rgba(10, 86, 255, .08);
      box-shadow: inset 0 0 0 2px rgba(10, 86, 255, .18);
    }
    @media (max-width: 780px) {
      .board { width: 100vw; }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="board" aria-label="June Directory exact single file 1:1 restoration">
      <img class="mockup" src="mockup.jpg" alt="June Directory approved mockup" />

      <a class="hotspot" href="#brand" aria-label="Brand" style="left:7%;top:1.8%;width:15.5%;height:6%;"></a>
      <a class="hotspot" href="#my-space" aria-label="My Space" style="left:88%;top:1.8%;width:10%;height:6%;"></a>

      <a class="hotspot" href="#home" aria-label="Home" style="left:0%;top:18%;width:6.5%;height:11%;"></a>
      <a class="hotspot" href="#projects" aria-label="Projects" style="left:0%;top:31.5%;width:6.5%;height:11%;"></a>
      <a class="hotspot" href="#library" aria-label="Library" style="left:0%;top:45%;width:6.5%;height:11%;"></a>
      <a class="hotspot" href="#notes" aria-label="Notes" style="left:0%;top:58.5%;width:6.5%;height:11%;"></a>
      <a class="hotspot" href="#favorites" aria-label="Favorites" style="left:0%;top:72%;width:6.5%;height:11%;"></a>

      <a class="hotspot" href="#hero" aria-label="Hero section" style="left:9.6%;top:9.2%;width:34%;height:31%;"></a>
      <a class="hotspot" href="#moodboard" aria-label="Moodboard" style="left:47.5%;top:7%;width:44.5%;height:40%;"></a>
      <a class="hotspot" href="#greeting" aria-label="Greeting card" style="left:10%;top:42.5%;width:27.5%;height:9.5%;"></a>

      <a class="hotspot" href="#projects-card" aria-label="Projects card" style="left:10%;top:55.1%;width:16.8%;height:27%;"></a>
      <a class="hotspot" href="#knowledge-card" aria-label="Knowledge Library card" style="left:27.4%;top:55.1%;width:16.8%;height:27%;"></a>
      <a class="hotspot" href="#notes-card" aria-label="Notes and Ideas card" style="left:44.8%;top:55.1%;width:16.8%;height:27%;"></a>
      <a class="hotspot" href="#resources-card" aria-label="Resources card" style="left:62.2%;top:55.1%;width:16.8%;height:27%;"></a>
      <a class="hotspot" href="#favorites-card" aria-label="Favorites card" style="left:79.5%;top:55.1%;width:16.4%;height:27%;"></a>

      <a class="hotspot" href="#quote" aria-label="Bottom quote section" style="left:10%;top:84.3%;width:86%;height:13.3%;"></a>

      <script type="application/json" id="hermes-layout">
      {
        "project": "June Directory",
        "mode": "exact_1to1_single_file",
        "canvas": {"width": 1402, "height": 1122},
        "note": "This file embeds the approved mockup directly as a base64 image so it opens correctly by itself on mobile and desktop. Invisible hotspots are preserved so Hermes/Codex can still understand the page sections.",
        "sections": [
          {"id": "sidebar", "role": "left navigation"},
          {"id": "brand", "role": "top brand area"},
          {"id": "hero", "role": "hero copy"},
          {"id": "moodboard", "role": "image collage"},
          {"id": "greeting", "role": "status/date card"},
          {"id": "cards", "role": "five directory cards"},
          {"id": "quote", "role": "bottom quote strip"}
        ]
      }
      </script>
    </main>
  </div>
</body>
</html>
