\"四大行动\n\n**核心事实：** 7月14日，中共重庆市委举行新闻发布会解读六届九次全会精神，市经济信息委主任王志杰宣布将实施**四大行动**推动科技创新与\"33618\"现代制造业集群体系深度融合：①科创平台提能级行动——建设一批制造业创新中心；②关键技术攻关行动——聚焦智能网联新能源汽车、功率半导体、工业软件等关键领域；③成果转化加速行动——建设一批概念验证中心和中试平台；④创新生态优化行动——加大制造业人才引进和研发费用加计扣除力度。这是重庆首次将\"203060\"重点攻坚突破体系（20个战略性产品、30项关键核心技术、60家链主企业）与\"33618\"制造业集群（3大主导产业+3大支柱产业+6大特色优势产业+18个新兴产业）进行系统性对接部署。\n\n**来源：** 重庆日报 / 新重庆客户端 (2026-07-14)\n**可信度：**（市委官方新闻发布会，经济信息委主任直接发布）\n\n---\n\n##  八戒点评\n\n今天两条新闻，一条\"硬\"基建、一条\"软\"政策，成渝双城经济圈一头在修路、一头在搭台。\n\n西渝高铁架梁完成这个事情看似跟", "source": "", "credibility": "", "type": "market", "primary_theme": "西区重点产业"}, {"date": "2026-07-16", "category": "西区产业", "title": "韩国BOBOO半导体关键零部件基地落户西安高新区，总投资1.5亿元", "content": "韩国BOBOO半导体关键零部件基地落户西安高新区，总投资1.5亿元\n\n**核心事实：** 7月9日，西安高新区与韩国BOBOO HITECH完成\"BOBOO半导体关键零部件维修制造基地\"MOU签约。项目总投资**1.5亿元**，聚焦半导体**静电吸盘（ESC）和加热盘（Heater）**等核心部件的维修及本地化生产。BOBOO HITECH深耕韩国半导体零部件领域30年，长期配套**三星、SK海力士**等头部存储晶圆企业。这是陕西继韩国艾洛特、新韩金刚石之后引进的又一韩资\"强链补链\"关键项目——三星西安工厂是全球最大NAND闪存生产基地，配套零部件本地化将大幅降低供应链风险。陕西省半导体行业协会确认：该项目将填补西北地区半导体核心精密零部件维修制造的空白。\n\n**来源：** 陕西日报/西部网/集邦咨询TrendForce (2026-07-14~15)\n**可信度：**（省半导体行业协会确认+高新区官方+MOU已签）", "source": "", "credibility": "", "type": "market", "primary_theme": "政策与投资"}, {"date": "2026-07-16", "category": "西区产业", "title": "成温邛高速扩容项目混凝土预制构件采购签约2.34亿元", "content": "成温邛高速扩容项目混凝土预制构件采购签约2.34亿元\n\n**核心事实：** 7月15日，成都高速（01785.HK）公告：全资附属公司成温邛高速公司与成都城投城建签订混凝土预制构件采购YZ标段合同，签约合同价约**2.34亿元（含税）**。成温邛高速扩容是成都都市圈环线交通的重点工程，此次签约标志着扩容工程进入实质性施工准备阶段。\n\n**来源：** 新时空/港交所公告 (2026-07-15)\n**可信度：**（港股上市公司公告，合同金额和签约方明确）", "source": "", "credibility": "", "type": "market", "primary_theme": "政策与投资"}, {"date": "2026-07-16", "category": "西区产业", "title": "西安全球最大2.4万吨自由锻造油压机正式投运", "content": "西安全球最大2.4万吨自由锻造油压机正式投运\n\n**核心事实：** 7月14日，位于西安的**全球最大2.4万吨自由锻造油压机**正式投运。该设备由西安\"智\"造，是中国重型机械研究院自主研发的超大型锻压装备，用于航空发动机涡轮盘、核电压力容器、舰船主轴等国家重大工程核心零部件的锻造。2.4万吨锻造力相当于将**4000头成年大象的重量集中在一个笔记本大小的面积上**，技术指标全球领先。该设备的投运标志着中国在超大型自由锻造领域从\"跟跑\"到\"领跑\"——此前全球最大锻压机为德国萨尔钢厂的1.65万吨油压机。\n\n**来源：** 西部网/陕西新闻网 (2026-07-14)\n**可信度：**（陕西省官媒报道+设备已投产运行）\n\n---\n\n##  八戒点评\n\n今天西区三条新闻一条比一条巴适——西安一个城市就占了俩，成都一个。\n\n先说BOBOO半导体零部件落户西安。**这个事情June你晓得撒，三星西安工厂是全球最大NAND基地，配套的ESC/Heater之前全从韩国进口——现在本地化维修+生产了，意味着西安半导体产业链从\"制造\"走向\"精密服务\"。** 这对TÜV莱茵西区意味着什么？半", "source": "", "credibility": "", "type": "market", "primary_theme": "西区重点产业"}, {"date": "2026-07-17", "category": "西区产业", "title": "西部首个生物医药专用科学计算中心在成都启动运营，总投资超2亿元", "content": "西部首个生物医药专用科学计算中心在成都启动运营，总投资超2亿元\n\n**核心事实：** 7月16日，成都·生物医药·科学计算中心正式启动运营。该中心由成都产投集团、金牛区政府、成都城投集团、成都数据集团联合投资，总投资超**2亿元**，是西部首个国产自主可控的生物医药专用科学计算中心。核心设备采用上海思朗科技自主研发的国内首款AI for Science 3D科学计算机（基于国产MaPU底层架构），实测分子动力学模拟较传统二维架构超算提升**2至4个数量级**。首批入驻企业包括成都中科奥格生物、成都先导药物、赛德特生物制药等。2025年成都医药健康产业规模突破**4000亿元**，近3年新药出海交易额累计约**260亿美元**。\n\n**来源：** 中国经营网 / 新浪财经 (2026-07-16)\n**可信度：**（权威财经媒体现场报道，数据详实可验证）", "source": "", "credibility": "", "type": "market", "primary_theme": "政策与投资"}, {"date": "2026-07-17", "category": "西区产业", "title": "川渝新能源汽车产量占全国11%，\"质链川渝\"行动纳入国家首批跨区域质量强链项目", "content": "川渝新能源汽车产量占全国11%，\"质链川渝\"行动纳入国家首批跨区域质量强链项目\n\n**核心事实：** 7月16日，重庆市市场监管局与四川省市场监管局联合召开新闻发布会，公布\"质链川渝\"行动阶段性成果。该行动聚焦智能网联新能源汽车产业链的技术攻关、标准研制与质量提升，已纳入国家市场监管总局**首批跨区域质量强链项目**。数据显示，2025年川渝两地汽车总产量达**372万辆**，占全国总产量的**11%**；其中新能源汽车产量为**152.8万辆**。这标志着川渝已成为中国新能源汽车产业的核心制造基地之一。\n\n**来源：** 重庆日报 / 今日头条 (2026-07-16)\n**可信度：**（官方新闻发布会+党媒报道，数据权威）", "source": "", "credibility": "", "type": "market", "primary_theme": "西区重点产业"}, {"date": "2026-07-17", "category": "西区产业", "title": "大唐重庆武隆银盘抽水蓄能电站主体工程开工，重庆唯一周调节能力电站", "content": "大唐重庆武隆银盘抽水蓄能电站主体工程开工，重庆唯一周调节能力电站\n\n**核心事实：** 7月16日，大唐重庆武隆银盘抽水蓄能电站主体工程正式开工，标志着项目由施工准备阶段全面转入主体工程建设。该项目是重庆**唯一具备周调节能力**的抽水蓄能电站，主要包括上水库、输水系统、发电厂房系统及下水库（利用已建成的银盘水电站水库）。电站建成后将在用电低谷时抽水蓄能、高峰时放水发电，实现电能与水能的高效转换，对渝东南地区电网调峰和新能源消纳具有战略意义。\n\n**来源：** 金台资讯 / 网易新闻 (2026-07-16)\n**可信度：**（央企官方项目，地方媒体报道）", "source": "", "credibility": "", "type": "market", "primary_theme": "西区重点产业"}, {"date": "2026-07-17", "category": "西区产业", "title": "成都构建完整机器人产业生态，天服江溪实验室+ROBO+智能机器人商店投入运营", "content": "成都构建完整机器人产业生态，天服江溪实验室+ROBO+智能机器人商店投入运营\n\n**核心事实：** 据新华社7月16日报道，成都正加速发展人工智能与机器人产业，打造从训练到商业化的完整生态。核心基础设施包括：①**天服江溪实验室机器人训练中心**——全尺寸仿真基地，可模拟零售、餐饮、街道等真实场景，持续生成场景数据集；②**ROBO+智能机器人商店**于2026年7月开业，集零售与体验于一体，展示配送机器人、人形机器人、伴侣机器人、环卫机器人、巡检机器人等多种应用。新华社评论称成都\"将工业集群化作为核心策略，构建了从训练到商业部署的成熟管道\"。\n\n**来源：** 新华社英文版 (2026-07-16)\n**可信度：**（国家级通讯社实地报道，配图佐证）\n\n---\n\n##  八戒点评\n\n今天四条新闻，成都占了三条、重庆一条——西区产业升级的速度黑死人哟。\n\n**June你各人看哈，这四件事对我们西区业务意味着啥子：**\n\n①**生物医药科算中心**——首批入驻的中科奥格、成都先导、赛德特都是搞创新药的，医药行业的GMP认证、ISO 13485医疗器械质量管理、ISO 1702", "source": "", "credibility": "", "type": "market", "primary_theme": "西区重点产业"}, {"date": "2026-07-18", "category": "西区产业", "title": "成都\"芯\"版图再添新军：上市企业新雷能子公司恩吉芯入驻成都IC PARK", "content": "成都\"芯\"版图再添新军：上市企业新雷能子公司恩吉芯入驻成都IC PARK\n\n**核心事实：** 7月17日，红星新闻记者从成都高新区获悉，上市企业北京新雷能科技股份有限公司的西部重点投资项目——**成都恩吉芯科技有限公司**正式入驻成都高新西区IC PARK。恩吉芯致力于功率电子领域核心技术研发与产业化应用，从事电源管理芯片、桥式驱动器、功率集成电机驱动器、DC/DC变换器等高性能集成电路产品的研发、测试与经营。母公司新雷能是通信、特种、铁路等领域整机设备企业的重要电源供应商，已实现电源产品**100%国产化**。\n\n同期，IC PARK（西区）引入的芯华创新中心已集聚AI和机器人企业**30余家**，联合天府绛溪实验室建设机器人训练技术创新中心；园区引入的天府无线智能研究院已完成装修，天府绛溪实验室预计年内入驻，形成\"感算芯片+具身智能+无线通信\"三大高能级转化平台。\n\n**来源：** 红星新闻 / 腾讯云 (2026-07-17)\n**可信度：**（成都高新区官方信息+主流媒体现场报道）", "source": "", "credibility": "", "type": "market", "primary_theme": "政策与投资"}, {"date": "2026-07-18", "category": "西区产业", "title": "45天极速出海！成都格力钛\"奔马\"新能源商用车交付非洲市场", "content": "45天极速出海！成都格力钛\"奔马\"新能源商用车交付非洲市场\n\n**核心事实：** 7月16日，位于成都新津经开区的成都格力钛新能源有限公司，一批12米\"奔马\"新能源商用车驶下生产线。这批专为非洲市场量身打造的定制化车辆，从接到客户需求到完成高质量交付，团队**仅用了45天**。研发与生产团队针对当地50℃高温、颠簸山路等复杂工况进行专项优化设计，再次刷新\"新津造\"出海纪录。成都格力钛是格力电器旗下新能源整车与电池储能板块的核心企业，此前氢燃料电池版\"奔马\"已获得内蒙古市场订单。\n\n**来源：** 今日头条 / 新津融媒 (2026-07-16)\n**可信度：**（地方官方媒体+企业实际交付，信息可验证）", "source": "", "credibility": "", "type": "market", "primary_theme": "西区重点产业"}, {"date": "2026-07-18", "category": "西区产业", "title": "重庆\"渝小健\"AI就医智能体正式上线，系国内首个省市级全流程智慧就医平台", "content": "重庆\"渝小健\"AI就医智能体正式上线，系国内首个省市级全流程智慧就医平台\n\n**核心事实：** 7月17日，由重庆市卫生健康委员会联合重庆市大数据局、蚂蚁集团打造的便捷就医智能体**\"渝小健\"**正式上线。市民可通过支付宝App或蚂蚁阿福App搜索\"渝小健\"，完成授权后即可使用智能导诊、云陪诊、报告查询与AI解读等全流程智慧就医服务。该项目依托数字重庆底座、本地医疗机构服务能力与蚂蚁AI大模型能力建设，项目于20 if(d<120){x.beginPath();x.moveTo(p.x,p.y);x.lineTo(q.x,q.y);x.strokeStyle='rgba(0,152,240,'+(.08*(1-d/120))+')';x.lineWidth=.4;x.stroke()}}}
requestAnimationFrame(draw)}
draw()})();

(function(){document.querySelectorAll('.kv[data-target]').forEach(function(el){var t=parseInt(el.getAttribute('data-target')),d=1200,s=Math.ceil(d/(t||1)),c=0,i=setInterval(function(){c+=Math.ceil((t-c)/3);if(c>=t){c=t;clearInterval(i);el.classList.remove('counting')}el.textContent=c},s);el.classList.add('counting')})})();

(function(){var chars='!@#$%^&*()_+-=[]{}|;:,.<>?/~`ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
document.querySelectorAll('.dt').forEach(function(el){var t=el.getAttribute('data-text'),l=t.length,c=Array(l).fill(''),i=0,f=setInterval(function(){var d='';for(var j=0;j<l;j++){if(c[j]===t[j]){d+=t[j]}else{if(Math.random()<.15){c[j]=t[j]}d+='<span style="color:rgba(0,152,240,.3)">'+chars[Math.floor(Math.random()*chars.length)]+'</span>'}
}el.innerHTML=d;i++;if(i>20||c.join('')===t){el.textContent=t;clearInterval(f)}},60)})})();
